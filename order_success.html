<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed | NextGen AutoCare</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background: var(--bg-body);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        .success-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 4rem;
            max-width: 500px;
            width: 90%;
        }

        .icon-circle {
            width: 100px;
            height: 100px;
            background: rgba(16, 185, 129, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
        }
    </style>
</head>

<body>
    <div class="success-card glass animate">
        <div class="icon-circle">
            <i data-lucide="check" style="width: 50px; height: 50px; color: var(--accent);"></i>
        </div>
        <h1 style="margin-bottom: 1rem;">Order Confirmed!</h1>
        <p style="color: var(--text-muted); line-height: 1.6; margin-bottom: 2rem;">
            Thank you for your purchase. Your order <strong>#ORD-{{ order_id }}</strong> has been placed successfully.
        </p>
        <div style="background: rgba(255,255,255,0.03); padding: 1.5rem; border-radius: 20px; margin-bottom: 2rem;">
            <p style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 0.5rem;">Total Amount Paid</p>
            <h2 style="color: var(--accent);">₹{{ "{:,.2f}".format(total) }}</h2>
        </div>
        <div style="display: flex; gap: 1rem; justify-content: center;">
            <a href="/shop" class="btn-premium">Continue Shopping</a>
            <a href="/" class="glass"
                style="padding: 1rem 2rem; border-radius: 50px; text-decoration: none; color: var(--text-main);">Home</a>
        </div>
    </div>
    <script>
        lucide.createIcons();
    </script>
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</body>

</html>
